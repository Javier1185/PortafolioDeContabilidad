<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portada · Portafolio de Contabilidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5EDD9;
    --paper-dim:#E9DCB9;
    --paper-line:#D6C495;
    --ink-dark:#2A1B0E;
    --ink-dark-dim:#7D6A4C;
    --brass:#CB9A2E;
    --brass-bright:#A9791E;
    --display:'Fraunces', serif;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(to bottom, rgba(203,154,46,0.06) 0px, rgba(203,154,46,0.06) 1px, transparent 1px, transparent 34px);
    color:var(--ink-dark);
    font-family:var(--sans);
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:40px 24px;
  }
 
  .cover{
    width:100%; max-width:620px;
    text-align:center;
    border:1.5px solid var(--paper-line);
    border-radius:6px;
    padding:52px 44px 44px;
    background:rgba(255,255,255,0.28);
    box-shadow:0 24px 50px -20px rgba(42,27,14,0.25);
  }
 
  .institution{
    font-family:var(--mono); font-size:12px; letter-spacing:2px; color:var(--brass-bright);
    text-transform:uppercase; margin-bottom:6px;
  }
  .faculty{
    font-family:var(--sans); font-weight:600; font-size:12.5px; color:var(--ink-dark-dim);
    letter-spacing:.5px; text-transform:uppercase; margin-bottom:34px;
  }
 
  .doc-title{
    font-family:var(--display); font-style:italic; font-weight:700; font-size:clamp(24px,4vw,32px);
    color:var(--ink-dark); line-height:1.3; margin-bottom:8px;
  }
  .rule{
    width:64px; height:2px; background:var(--brass); margin:18px auto 30px;
  }
 
  .course-label{ font-family:var(--mono); font-size:10.5px; letter-spacing:2px; color:var(--ink-dark-dim); text-transform:uppercase; }
  .course-name{ font-family:var(--display); font-weight:600; font-size:19px; color:var(--ink-dark); margin-top:4px; margin-bottom:30px; }
 
  .cover-image-slot{
    width:172px; height:172px; margin:0 auto 30px;
    border:2px dashed var(--paper-line); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink-dark-dim); font-family:var(--mono); font-size:10px; text-align:center;
    padding:10px; line-height:1.5;
    background:rgba(255,255,255,0.3);
  }
  .cover-image-slot img{ width:100%; height:100%; object-fit:contain; }
 
  .info-block{ margin-top:8px; }
  .info-line{ font-family:var(--sans); font-size:14px; color:var(--ink-dark); margin-bottom:8px; }
  .info-line strong{ font-weight:600; color:var(--brass-bright); }
 
  .year{
    margin-top:30px; font-family:var(--mono); font-size:13px; letter-spacing:3px; color:var(--ink-dark-dim);
  }
</style>
</head>
<body>

  <div class="cover">
    <div class="institution">Universidad Tecnológica de Panamá</div>
    <div class="faculty">Facultad de Ing. en Sistemas Computacionales</div>

    <div class="doc-title">Portafolio Digital Estudiantil</div>
    <div class="rule"></div>

    <div class="course-label">Curso</div>
    <div class="course-name">Contabilidad General</div>

    <!--
      Para poner tu foto o el escudo de la universidad:
      reemplaza el <div class="cover-image-slot">...</div> de abajo por:
      <div class="cover-image-slot"><img src="../files/escudo-utp.png" alt="Escudo UTP"></div>
      y coloca el archivo de imagen en la carpeta files/ del proyecto.
    -->
<div class="cover-image-slot"><img src="../files/logo-utp.png" alt="Escudo UTP"></div>

    <div class="info-block">
      <div class="info-line"><strong>Pertenece a:</strong> Javier Forchiney</div>
      <div class="info-line"><strong>Cédula:</strong> 8-1015-1467</div>
      <div class="info-line"><strong>Facilitador:</strong> Prof. Alina Cardoze</div>
    </div>

    <div class="year">2026</div>
  </div>

</body>
</html>
